name: Continuous Deployment (NPM Release)

on:
  push:
    tags:
      - 'v*' # Dispara quando um push de tag começar com 'v' (ex: v1.0.1)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Necessário para autenticação moderna e segura no NPM

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Run Quality Checks
        run: |
          npm run lint
          npm run test

      - name: Generate Production Build
        run: npm run build

      - name: Publish Package to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}